services:
  pocketbase:
    image: ${GHCR_IMAGE:-ghcr.io/sage-is/db-sage-pb}:${IMAGE_TAG:-latest}
    ports:
      - "8090:8090"
    volumes:
      - pb_data:/app/pb_data
      - ./pb_hooks:/app/pb_hooks:ro
      - ./pb_migrations:/app/pb_migrations:ro
      - ./pb_public:/app/pb_public:ro
    environment:
      - RESEND_API_KEY=${RESEND_API_KEY:-}
    command: >
      pocketbase serve
        --http=0.0.0.0:8090
        --dir=/app/pb_data
        --hooksDir=/app/pb_hooks
        --migrationsDir=/app/pb_migrations
        --publicDir=/app/pb_public

volumes:
  pb_data:
